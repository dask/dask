name: Upstream

on:
  schedule:
    - cron: "0 1 * * *"
  push:
    branches: [main]
    tags: ["*"]
  pull_request:
  workflow_dispatch:

# When this workflow is queued, automatically cancel any previous running
# or pending jobs from the same branch
concurrency:
  group: upstream-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # Do not run the schedule job on forks
    if: github.repository == 'dask/dask' || github.event_name != 'schedule'

    name: ${{ matrix.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        environment: [py314, nightly]
    
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Reconfigure pytest-timeout
        # No SIGALRM available on Windows
        # Note: all changes to the source code must happen before `pixi install`
        # or we'll build the package twice
        if: ${{ matrix.os != 'windows-latest' }}
        run: sed -i.bak 's/timeout_method = "thread"/timeout_method = "signal"/' pyproject.toml

      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: v0.70.2
          run-install: false
          cache: false
          locked: false

      - name: pixi update
        run: pixi update -e ${{ matrix.environment }}

      - name: pixi install
        run: pixi install -e ${{ matrix.environment }}

      - name: Run tests
        id: run_tests
        run: pixi run -e ${{ matrix.environment }} test-ci --report-log output-log.jsonl

      - name: Open or update issue on failure
        if: |
          failure()
          && github.event_name != 'pull_request'
          && github.repository == 'dask/dask'
          && steps.run_tests.outcome == 'failure'
        uses: scientific-python/issue-from-pytest-log-action@v1.5.0
        with:
          log-path: output-log.jsonl
          issue-title: ⚠️ Upstream CI failed ⚠️
          issue-label: upstream

      - name: Coverage
        uses: codecov/codecov-action@v7
